<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SourceCheck — AI 출처 검증기</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">🔍 SourceCheck</div>
      <nav class="actions">
        <a href="/" class="navlink">AIHelper</a>
        <a href="/verify.html" class="navlink active">SourceCheck</a>
      </nav>
    </header>

    <main class="verify-layout">
      <section class="verify-input">
        <h2>AI 응답에서 출처 검증</h2>
        <p class="muted">AI가 인용한 URL, DOI, arXiv, ISBN, 논문 제목("따옴표")을 자동으로 찾아 실제 존재하는지 확인합니다.</p>
        <textarea id="verifyText" rows="14" placeholder='예) "Attention Is All You Need" (Vaswani et al., 2017). https://arxiv.org/abs/1706.03762 / doi: 10.1038/s41586-021-03819-2'></textarea>
        <div class="verify-actions">
          <button id="verifyBtn" class="primary">검증 시작</button>
          <span id="verifyStatus" class="muted"></span>
        </div>
      </section>

      <section class="verify-results">
        <h3>검증 결과</h3>
        <div id="results" class="results">아직 결과가 없습니다.</div>
      </section>
    </main>

    <script src="/verify.js"></script>
  </body>
</html>
